services:
  backend:
    build: .
    container_name: openshorts-backend
    network_mode: host
    dns:
      - "${DOCKER_DNS_1:-1.1.1.1}"
      - "${DOCKER_DNS_2:-8.8.8.8}"
    devices:
      - "nvidia.com/gpu=all"
    environment:
      MAX_CONCURRENT_JOBS: "${MAX_CONCURRENT_JOBS:-1}"
      JOB_NICE_LEVEL: "${JOB_NICE_LEVEL:-0}"
      FFMPEG_THREADS: "${FFMPEG_THREADS:-16}"
      FFMPEG_FILTER_THREADS: "${FFMPEG_FILTER_THREADS:-8}"
      FFMPEG_PRESET: "${FFMPEG_PRESET:-fast}"
      SHORTFORM_VIDEO_ENCODER: "${SHORTFORM_VIDEO_ENCODER:-auto}"
      NVENC_PRESET: "${NVENC_PRESET:-p4}"
      NVENC_CQ: "${NVENC_CQ:-18}"
      TRACKING_DETECTION_FPS: "${TRACKING_DETECTION_FPS:-10}"
      RENDER_SCRATCH_DIR: "${RENDER_SCRATCH_DIR:-/tmp/openshorts-render}"
      RENDER_CACHE_DIR: "${RENDER_CACHE_DIR:-/var/cache/openshorts/render}"
      BROWSER_PREVIEW_CONCURRENCY: "${BROWSER_PREVIEW_CONCURRENCY:-1}"
      BROWSER_PREVIEW_THREADS: "${BROWSER_PREVIEW_THREADS:-2}"
      BROWSER_PREVIEW_WIDTH: "${BROWSER_PREVIEW_WIDTH:-360}"
      BROWSER_PREVIEW_FPS: "${BROWSER_PREVIEW_FPS:-12}"
      BROWSER_PREVIEW_PRESET: "${BROWSER_PREVIEW_PRESET:-ultrafast}"
      BROWSER_PREVIEW_CRF: "${BROWSER_PREVIEW_CRF:-38}"
      BROWSER_PREVIEW_MAXRATE: "${BROWSER_PREVIEW_MAXRATE:-600k}"
      BROWSER_PREVIEW_BUFSIZE: "${BROWSER_PREVIEW_BUFSIZE:-1200k}"
      BROWSER_PREVIEW_AUDIO_BITRATE: "${BROWSER_PREVIEW_AUDIO_BITRATE:-64k}"
      WHISPER_CPU_THREADS: "${WHISPER_CPU_THREADS:-16}"
      WHISPER_DEVICE: "${WHISPER_DEVICE:-cuda}"
      WHISPER_MODEL: "${WHISPER_MODEL:-distil-large-v3}"
      WHISPER_CPU_MODEL: "${WHISPER_CPU_MODEL:-distil-large-v3}"
      WHISPER_MODEL_DE: "${WHISPER_MODEL_DE:-primeline/whisper-large-v3-german}"
      WHISPER_CPU_MODEL_DE: "${WHISPER_CPU_MODEL_DE:-primeline/whisper-large-v3-german}"
      WHISPER_MODEL_NON_EN: "${WHISPER_MODEL_NON_EN:-large-v3}"
      WHISPER_CPU_MODEL_NON_EN: "${WHISPER_CPU_MODEL_NON_EN:-large-v3}"
      WHISPER_HF_CONVERT_ENABLED: "${WHISPER_HF_CONVERT_ENABLED:-true}"
      WHISPER_HF_CONVERT_QUANTIZATION: "${WHISPER_HF_CONVERT_QUANTIZATION:-}"
      WHISPER_HF_CONVERT_CACHE_DIR: "${WHISPER_HF_CONVERT_CACHE_DIR:-/app/output/.cache/whisper_ct2}"
      HF_HOME: "${HF_HOME:-/app/output/.cache/huggingface}"
      HUGGINGFACE_HUB_CACHE: "${HUGGINGFACE_HUB_CACHE:-/app/output/.cache/huggingface/hub}"
      TRANSFORMERS_CACHE: "${TRANSFORMERS_CACHE:-/app/output/.cache/huggingface/transformers}"
      WHISPER_CPU_AUTO_DISTIL: "${WHISPER_CPU_AUTO_DISTIL:-true}"
      WHISPER_MODEL_FALLBACKS: "${WHISPER_MODEL_FALLBACKS:-medium,small,base}"
      WHISPER_CUDA_MODEL_FALLBACKS: "${WHISPER_CUDA_MODEL_FALLBACKS:-large-v3,medium,small,base}"
      WHISPER_COMPUTE_TYPE: "${WHISPER_COMPUTE_TYPE:-auto}"
      WHISPER_SAFE_MODE: "${WHISPER_SAFE_MODE:-true}"
      WHISPER_SAFE_VRAM_MARGIN_MB: "${WHISPER_SAFE_VRAM_MARGIN_MB:-512}"
      WHISPER_NUM_WORKERS: "${WHISPER_NUM_WORKERS:-1}"
      WHISPER_BEAM_SIZE: "${WHISPER_BEAM_SIZE:-5}"
      WHISPER_VAD_FILTER: "${WHISPER_VAD_FILTER:-true}"
      WHISPER_LANGUAGE: "${WHISPER_LANGUAGE:-de}"
      WHISPER_LANGUAGE_HINTS: "${WHISPER_LANGUAGE_HINTS:-de}"
      WHISPER_LANGUAGE_RETRY_ENABLED: "${WHISPER_LANGUAGE_RETRY_ENABLED:-true}"
      WHISPER_LANGUAGE_RETRY_MAX_PROBABILITY: "${WHISPER_LANGUAGE_RETRY_MAX_PROBABILITY:-0.92}"
      YOUTUBE_AUTH_MODE: "${YOUTUBE_AUTH_MODE:-auto}"
      YOUTUBE_COOKIES_FILE: "${YOUTUBE_COOKIES_FILE:-/app/cookies.txt}"
      YOUTUBE_COOKIES_FROM_BROWSER: "${YOUTUBE_COOKIES_FROM_BROWSER:-}"
      YOUTUBE_COOKIES: "${YOUTUBE_COOKIES:-}"
      YOUTUBE_VISITOR_DATA: "${YOUTUBE_VISITOR_DATA:-}"
      YOUTUBE_PO_TOKEN_WEB: "${YOUTUBE_PO_TOKEN_WEB:-}"
      YOUTUBE_PO_TOKEN_MWEB: "${YOUTUBE_PO_TOKEN_MWEB:-}"
      YOUTUBE_PO_TOKEN_ANDROID: "${YOUTUBE_PO_TOKEN_ANDROID:-}"
      YOUTUBE_PO_TOKENS: "${YOUTUBE_PO_TOKENS:-}"
      OLLAMA_DISABLE_THINKING: "${OLLAMA_DISABLE_THINKING:-true}"
      PREFERRED_DOWNLOAD_HEIGHT: "${PREFERRED_DOWNLOAD_HEIGHT:-1080}"
      MIN_SOURCE_EDGE: "${MIN_SOURCE_EDGE:-720}"
      SETTINGS_SYNC_DIR: "${SETTINGS_SYNC_DIR:-/app/output/.settings_sync}"
      SETTINGS_SYNC_TTL_DAYS: "${SETTINGS_SYNC_TTL_DAYS:-365}"
      SETTINGS_SYNC_MAX_BYTES: "${SETTINGS_SYNC_MAX_BYTES:-2097152}"
      LONGFORM_UPLOAD_TMP_ROOT: "${LONGFORM_UPLOAD_TMP_ROOT:-/app/output/.longform_uploads}"
      LONGFORM_SOURCE_HOST_DIR: "${LONGFORM_SOURCE_HOST_DIR:-./output/longform_source_mount}"
      LONGFORM_SOURCE_MOUNT_ROOT: "${LONGFORM_SOURCE_MOUNT_ROOT:-/mnt/longform-source}"
      LONGFORM_ALLOWED_SOURCE_ROOTS: "${LONGFORM_ALLOWED_SOURCE_ROOTS:-/mnt/longform-source}"
      NETWORK_MODE: "host"
      NVIDIA_VISIBLE_DEVICES: "${NVIDIA_VISIBLE_DEVICES:-all}"
      NVIDIA_DRIVER_CAPABILITIES: "${NVIDIA_DRIVER_CAPABILITIES:-compute,utility,video}"
      OMP_NUM_THREADS: "${OMP_NUM_THREADS:-16}"
      OPENBLAS_NUM_THREADS: "${OPENBLAS_NUM_THREADS:-1}"
      MKL_NUM_THREADS: "${MKL_NUM_THREADS:-1}"
      NUMEXPR_NUM_THREADS: "${NUMEXPR_NUM_THREADS:-1}"
    volumes:
      - type: bind
        source: .
        target: /app
      - /app/__pycache__
      - openshorts-render-cache:/var/cache/openshorts
      - type: bind
        source: ${LONGFORM_SOURCE_HOST_DIR:-./output/longform_source_mount}
        target: ${LONGFORM_SOURCE_MOUNT_ROOT:-/mnt/longform-source}
        read_only: true
        bind:
          propagation: rshared
    restart: unless-stopped

  frontend:
    build: ./dashboard
    container_name: openshorts-frontend
    network_mode: host
    dns:
      - "${DOCKER_DNS_1:-1.1.1.1}"
      - "${DOCKER_DNS_2:-8.8.8.8}"
    command: npm run dev -- --host --port 5175
    volumes:
      - ./dashboard:/app
      - /app/node_modules
    restart: unless-stopped
    depends_on:
      - backend

volumes:
  openshorts-render-cache:
