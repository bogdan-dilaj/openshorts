services:
  backend:
    build: .
    container_name: openshorts-backend
    network_mode: host
    dns:
      - "${DOCKER_DNS_1:-1.1.1.1}"
      - "${DOCKER_DNS_2:-8.8.8.8}"
    devices:
      - "nvidia.com/gpu=all"
    environment:
      MAX_CONCURRENT_JOBS: "${MAX_CONCURRENT_JOBS:-1}"
      JOB_NICE_LEVEL: "${JOB_NICE_LEVEL:-10}"
      FFMPEG_THREADS: "${FFMPEG_THREADS:-2}"
      FFMPEG_FILTER_THREADS: "${FFMPEG_FILTER_THREADS:-1}"
      FFMPEG_PRESET: "${FFMPEG_PRESET:-fast}"
      WHISPER_CPU_THREADS: "${WHISPER_CPU_THREADS:-4}"
      WHISPER_DEVICE: "${WHISPER_DEVICE:-cuda}"
      WHISPER_MODEL: "${WHISPER_MODEL:-distil-large-v3}"
      WHISPER_CPU_MODEL: "${WHISPER_CPU_MODEL:-distil-large-v3}"
      WHISPER_MODEL_DE: "${WHISPER_MODEL_DE:-primeline/distil-whisper-large-v3-german}"
      WHISPER_CPU_MODEL_DE: "${WHISPER_CPU_MODEL_DE:-primeline/distil-whisper-large-v3-german}"
      WHISPER_MODEL_NON_EN: "${WHISPER_MODEL_NON_EN:-large-v3}"
      WHISPER_CPU_MODEL_NON_EN: "${WHISPER_CPU_MODEL_NON_EN:-large-v3}"
      WHISPER_HF_CONVERT_ENABLED: "${WHISPER_HF_CONVERT_ENABLED:-true}"
      WHISPER_HF_CONVERT_QUANTIZATION: "${WHISPER_HF_CONVERT_QUANTIZATION:-}"
      WHISPER_HF_CONVERT_CACHE_DIR: "${WHISPER_HF_CONVERT_CACHE_DIR:-/tmp/.cache/whisper_ct2}"
      WHISPER_CPU_AUTO_DISTIL: "${WHISPER_CPU_AUTO_DISTIL:-true}"
      WHISPER_MODEL_FALLBACKS: "${WHISPER_MODEL_FALLBACKS:-medium,small,base}"
      WHISPER_COMPUTE_TYPE: "${WHISPER_COMPUTE_TYPE:-auto}"
      WHISPER_SAFE_MODE: "${WHISPER_SAFE_MODE:-true}"
      WHISPER_SAFE_VRAM_MARGIN_MB: "${WHISPER_SAFE_VRAM_MARGIN_MB:-1800}"
      WHISPER_NUM_WORKERS: "${WHISPER_NUM_WORKERS:-1}"
      WHISPER_BEAM_SIZE: "${WHISPER_BEAM_SIZE:-5}"
      WHISPER_VAD_FILTER: "${WHISPER_VAD_FILTER:-true}"
      WHISPER_LANGUAGE: "${WHISPER_LANGUAGE:-auto}"
      WHISPER_LANGUAGE_HINTS: "${WHISPER_LANGUAGE_HINTS:-}"
      WHISPER_LANGUAGE_RETRY_ENABLED: "${WHISPER_LANGUAGE_RETRY_ENABLED:-true}"
      WHISPER_LANGUAGE_RETRY_MAX_PROBABILITY: "${WHISPER_LANGUAGE_RETRY_MAX_PROBABILITY:-0.92}"
      YOUTUBE_AUTH_MODE: "${YOUTUBE_AUTH_MODE:-auto}"
      YOUTUBE_COOKIES_FILE: "${YOUTUBE_COOKIES_FILE:-/app/cookies.txt}"
      YOUTUBE_COOKIES_FROM_BROWSER: "${YOUTUBE_COOKIES_FROM_BROWSER:-}"
      YOUTUBE_COOKIES: "${YOUTUBE_COOKIES:-}"
      YOUTUBE_VISITOR_DATA: "${YOUTUBE_VISITOR_DATA:-}"
      YOUTUBE_PO_TOKEN_WEB: "${YOUTUBE_PO_TOKEN_WEB:-}"
      YOUTUBE_PO_TOKEN_MWEB: "${YOUTUBE_PO_TOKEN_MWEB:-}"
      YOUTUBE_PO_TOKEN_ANDROID: "${YOUTUBE_PO_TOKEN_ANDROID:-}"
      YOUTUBE_PO_TOKENS: "${YOUTUBE_PO_TOKENS:-}"
      OLLAMA_DISABLE_THINKING: "${OLLAMA_DISABLE_THINKING:-true}"
      PREFERRED_DOWNLOAD_HEIGHT: "${PREFERRED_DOWNLOAD_HEIGHT:-1080}"
      MIN_SOURCE_EDGE: "${MIN_SOURCE_EDGE:-720}"
      SETTINGS_SYNC_DIR: "${SETTINGS_SYNC_DIR:-/tmp/openshorts/settings_sync}"
      SETTINGS_SYNC_TTL_DAYS: "${SETTINGS_SYNC_TTL_DAYS:-365}"
      SETTINGS_SYNC_MAX_BYTES: "${SETTINGS_SYNC_MAX_BYTES:-2097152}"
      NETWORK_MODE: "host"
      NVIDIA_VISIBLE_DEVICES: "${NVIDIA_VISIBLE_DEVICES:-all}"
      NVIDIA_DRIVER_CAPABILITIES: "${NVIDIA_DRIVER_CAPABILITIES:-compute,utility,video}"
      OMP_NUM_THREADS: "${OMP_NUM_THREADS:-4}"
      OPENBLAS_NUM_THREADS: "${OPENBLAS_NUM_THREADS:-1}"
      MKL_NUM_THREADS: "${MKL_NUM_THREADS:-1}"
      NUMEXPR_NUM_THREADS: "${NUMEXPR_NUM_THREADS:-1}"
    volumes:
      - .:/app
      - /app/__pycache__
    restart: unless-stopped

  frontend:
    build: ./dashboard
    container_name: openshorts-frontend
    network_mode: host
    dns:
      - "${DOCKER_DNS_1:-1.1.1.1}"
      - "${DOCKER_DNS_2:-8.8.8.8}"
    command: npm run dev -- --host --port 5175
    volumes:
      - ./dashboard:/app
      - /app/node_modules
    restart: unless-stopped
    depends_on:
      - backend
